body:
  text: 五音看時逆順十干所主日辰五音看時順逆順十干所主日辰甲乙丙丁戊己庚辛壬癸於醜寅卯辰巳午未申酉戌亥論五陽脈浮滑實弦洪浮輕而在上隱隱緩散如水之浮物重指如無如輕指愈久愈盈氿然若三部俱浮心氣不足也滑應指如珠圓重按即伏舉指渾然不進不退稍重於浮若三部俱滑主肝氣不足也實虛之按其脈源長久而不絶輕則有餘重則沉緩於弦小於洪若三部俱實主脾氣不足也弦應指緊迫如弓弦重按愈數輕指急聚斂而不散久而不縮若三部俱弦主肺氣不足也洪應手源大流長尋之不弦不浮輕重皆有若三部俱洪主腎氣不足也論五陰脈微沉緩澀伏微緩細伏弱若三部俱弱微血即滯主神不足也沉若有若無若三部俱沉主心虛氣不足也緩如絲在經若三部俱緩主腎精不足也澀澀而不滑若三部俱澀主肝氣而魂不足也伏沉而難見若三部俱伏主肺氣而魄不足也論四營脈四營者曰清曰濁曰輕曰重輕清者陽也重濁者陰也欲知貴賤貧富壽夭須用四營脈求之五陽五陰該貫一體而精神魂魄氣血骨靡不與焉故脈清則氣色骨體輕清稟於形部足可知也論輕清重濁四脈輕要純粹溫潤源流不斷假有疾痿其清不濡主受氣皆清有高識遠智奇才重望故五藏所生亦各有數也清要中清而浮壯如飛羽指重尋之其來亦在若三部俱清而濡隱隱常動主骨體清雅眉目疏秀聰明遠達之士也重中濁而沉粗澀不清也指按來去重濁亦在若三部俱重主神困沉冷性執人也重濁脈多亦在其人為事不快當也濁如緩而粗按之浮濁滿指洶然俗濁之氣謂濁脈主性愚癡無識之狀也四營五脈歌肝輕清心部輕清貴榮祿堂堂相貌人數逢三八當亨泰恭敬猶如目色明心心部輕清應在神聰明須作廟堂人旺看甲乙無留滯二七年來貴顯身脾脾部輕清遠慮長人稱其貌相堂堂年逢五十當成就富貴聰明遠播揚肺肺部輕清義勇才皮膚潤澤喜談偕看看四九名初顯武略功臣踏帝階腎腎部輕清氣亦清才逢一六遇光榮欨齠便有英靈學年少須當佐聖明肝重濁肝家重濁形為人浪執更無情下愚不是眼中濁無奈緣生骨不清心心家重濁主無神性急情乖殆喪身眼視不明仍短促夭凶難得侍雙親脾脾家重濁主風狂無義欺人命不長縱使在心清應指也應中富不賢良肺肺家重濁多無義性貪淫野貌顏粗貧賤一生無別事多因嫉妬損身軀腎腎家重濁最無情少智多愚生相輕此部若無清一點平生那得見光榮論五臟四證訣知憂喜吉凶禍福之故心脈浮子孫喜應丙丁日微應申酉日沉水火厄應亥子日緩主孝服應寅卯日澀手足病應辰戌丑未日伏主死厄應巳午日清祿喜應三四八濁主憂病內事應巳午日肝脈浮主厄難應庚辛甲乙日滑才祿喜應戊己日實子孫喜應壬癸日弦主第宅喜應甲乙日洪父母進喜應丙丁日微主尊長喜應申酉日沉主水火厄應亥子日緩主孝服應寅卯日澀主病應辰戌丑未日伏主憂子孫應巳午日清主喜事應三五七日濁主憂事應外一五七日肺脈浮主喜事應庚辛日滑主子孫喜應戊己日實主名譽喜應壬癸日洪主傷死應丙丁日微主病事憂身應申酉日沉主子孫災應亥子日緩主失物歸應寅卯日澀主死亡事應辰戌丑未日伏主內凶事應巳午日清主喜應四六八日濁主憂外應一三五日腎脈浮主子孫喜應壬癸日滑主才喜應戊己日實主憂失應壬癸日弦主父母喜應甲乙日洪主才祿至應丙丁日沉主驚恐應亥子日緩主憂子孫應寅卯日澀主危厄應辰戌丑未日伏主憂身位應已午日清主喜事應濁主憂外應左心小腸應數歌心脈喜浮洪安知五臟通滯濡並滑石時運未難終弦應當無病神凝緩脈同總浮微澀短邪氣入心中弦數因風熱微沉怯外風實長胸膈壅脈伏主陰沖微怯心還恐弦長弱不從那看三十五丙丁問來蹤肝膽應數歌肝藏應春弦長長細可憐短微沉澀見金剋木難全洪大間中愈微沉澀命涎緩時憂胃冷弦數主筋攣浮實相瞳赤虛因澀伏難滑時連膽濁頭痛有風涎微緩輕浮暗生花愈見難動力四十二甲乙就中攀腎膀胱應數歌腎脈沉兼滑隨時藏府知大浮仍緩散有疾奈君何浮澀虛邪愈弦長得實疴大洪浮脈起雖命亦無多滑數更無奈虛煩實脈瘥膀胱兼甚熱實大見吞魔浮滑虛應大腰疼夢泄多動時看六八壬癸問前途右肺大腸應數歌肺藏脈輕浮平和澀短憂大洪弦日反有疾一場憂沉滑虛還愈阿阿緩不愁細弦長更緊邪退亦無求浮實心應燥便中澀未休滑來即實大涎唾不宜秋沉緊細仍滑勞兼氣轉抽定看三十動庚與六辛求脾胃應數歌脾胃脈宜輕依依大緩平反為弦緊急長憂命欲傾浮短終安愈洪長病亦醒沉邪緩不及終久得安寧浮實終消水微浮寒熱並緊長脾隱隱實大困心情滑主脾熱燥牙宣口又腥動分二八五戊己閣中宮命門三焦應數歌命脈沉而實輕按是三焦遲數代浮洪下元總不利太素七十二候應數靈樞云五日為候三候為氣三氣為節二節為時四時為歲運化無窮立春立夏立秋立冬七十有二候動中分止脈克應知死期妙應而無惑正月立春日脈十五動而一止主明年魚陟負冰日死雨水脈二十動主二年獺祭魚日死脈二十五動主二年候雁北日死脈三十動一止主三年草木萌動死二月驚蟄脈四十動而止主四年鶬鶊鳴日死凡四時孟仲季計九十日兩中分之故四十五日約中氣也故云左右須候四時脈四十五動為一息此云平和安靜之候也春分脈二十動而止主二年玄鳥至日死十日雷乃發聲十五日始電且如驚蟄桃始華脈三十動而止主三年春分始電日死以下仿此三月清明且如驚蟄桃始華日脈四十動主四年清明田鼠化鴽日死下仿此自立春東風解冰至鷹化為鳩四十五日自玄鳥至及桐始花二十日萍始生三十五日戴勝降於桑四十五日四月立夏脈十五動主明年王瓜生日死小滿脈二十動主二年苦菜莠日死二十五日靡草死三十日麥秋至五月芒種四十動而止主四年鵙始鳴日死四十五日反舌無聲四時得中氣者也夏至五日鹿角解且如芒種日二十動至二年夏至鹿角解日死下仿此且如芒種螳螂生日脈三十動主三年夏至雕始鳴日死六月小暑二十月溫風至且如芒種日四十動而止主四年中小暑蟋蟀居壁日死三十日鷹始蟄三十五日腐草為螢四十日上潤溽暑四十五日和平氣大雨時行七月立秋五日涼風至十日白露降立秋寒蟬鳴日脈十五動主明年寒蟬鳴日死二十日鷹乃祭鳥三十日禾乃登四十動主四年八月白露玄鳥歸日死四十五動群鳥養羞和平氣秋分五日雷乃收聲且如白露脈二十動主二年秋分雷收聲日死十日蟄蟲壞戶十五日水始涸九月寒露且如白露鴻雁來脈四十動主四年寒露雀入水化蛤日死霜降三十日菊有黃華四十日草木黃落四十五日蟄蟲咸俯中和氣十月立冬五日水始冰十五日地始凍脈十五動一止主一年立冬雉入水化蜃日死三十動主三年小雪閉塞成冬日死小雪三十五日鶡鴠不鳴四十動主四年大雪虎始交日死四十五日荔挺出是安靜之脈也十一月大雪五日鶡鴠不鳴冬至五日蚯蚓結十日麋角解十五日水泉動且如大雪三十動主三年冬至水泉動日死脈四十動主四年小寒鵲始巢日死十二月小寒二十日鷹北鄉三十日雉雊且如冬至四十動主四年大寒徵鳥厲疾日死大寒三十五雞乳四十五水澤腹堅是安靜之氣左右須候四時脈四十五動為一息乃平和安靜之脈論三候一氣六氣一時四時一歲各弘其位而主治焉五運相襲周而復始學者不知年之所加氣之盛衰虛實之故不可以為工也叔和訣四十五動為一息又曰五十不止身無病數內有止皆知定四十一止一藏絶卻後四年多沒命三十一止即三年二十一止二年應十五一止一年殂已下有止看暴病太素提綱總論天地一太極也人身一天地也五行之在天自天一生水水生木木生火火生土土生金金復生水五行順布三陰三陽所在為根也至如太玄木火土金水以木在上水在下所謂相生之無窮表河圖之數堯典所謂水火金木土谷五行相剋者明洛書之數也河圖以相生而成洛書以相剋而成人身亦然人稟天地之氣以生故五行之氣隱相五藏見相六脈自腎水生肝木肝木生心君火心君火生三焦相火相火生脾土脾土生肺金肺金復生腎水以相生而成者也且如水生木是水為母木生火是木受竊氣母乃力爭火又生土是火為母土為子土見火被水克故怒而剋水所謂母見傷子來相救相生相剋展轉無窮此人身之太極也故善觀脈者切造化之功體陰陽之正察一動之微窮萬化之機是以脈分六部應變無窮醫家七表八里九道十怪等脈詳考其論深切著明其立數十萬言月截月截悉其備罔有二遺然究其所用立為得失卒未有盡其要也而得之於大始大言之外者而不知在天地之間衆人之五行在人身者一人之五行衆人者其氣散一人者其氣專氣散者難以明氣專者易以見古之君子於脈而有德焉故於陽氣未盛陰氣未散進食未進榮衛調和之時一舉指間而知其平生為何如人當受何福富貴貧賤壽夭正邪若辨黑白其一二有父母妻子所不能知自心所不能臆無不明徹此無他上於理而已其太素脈者以心為命宮心君也一身之主也以小腸為遷移蓋志者心之所之也稟令而行吉凶晦吝所由生也以膽為福德膽得肝之氣受心而用也以肝為官祿肝者得水之生為心之母得天之者源也以肺為父母蓋肺為月孛父母之象初氣所出也大腸為妻子蓋大腸為計都得肺之象配乎初氣也胃為才帛蓋為脾之餘氣也脾為田宅所以滋養萬物者也三焦為僕馬相火受命於心者也以此推之無不洞徹謹論總論太素脈者當以輕清重濁者為的論輕清者為陽為富貴重濁者為陰為貧賤男子以肝木震位為主以決功名女子以肺金兌位為主以決福德且如輕清者如指摸玉純粹滋潤應指分明六脈不克如源之流不至斷絶縱有小疾其清不濁主為人受於沖和智識明敏祿位高權以為輕清之脈重濁者應指不明如撒干沙滿指前大後小此為重濁之脈論也八卦初中末運論大抵男子以肝木決取看其卦以斷初年中取以斷中主右關脾部以斷末主女人以肺部沉取以決初年中取以斷中主右關脾脈以斷末主同且如肝逢三至即離卦主事二十五年氣數四至數即是震卦行運余仿此大概男子宜行東南方氣運離巽震坤是也取其氣運相生不克不晦滯女人宜行西北方氣運乾兌坎艮是也取其氣運之揪斂為得其宜女人行西北方為得宜倘若男子行西北方之運為晦滯奔馳多有成敗女人仿此出身之脈以德性若應指得一至而止即是乾卦為出身以此參斷決無差錯肥人脈沉而細瘦人脈浮而大沉細者按之至骨浮大者應指至筋為合度富貴之人脈宜沉靜不宜急躁下指至骨方應貴乎沉靜之中包藏如珠分明者為上格女人出身以肺斷之大凡觀脈之法取平旦陰氣未散陽氣未盛飲食未進榮衛調和方可下指次要隨機應變觀其息數自己呼吸斷他人之息數乾一兌二離三震四巽五坎六艮七坤八詩曰下脈三指要心堅若還按本亦徒然大凡脈數憑至數表裡詳推莫失原又如神變化百千年不論前篇及後篇兩字之中分造化若人悟得始應傳六氣所主心脈少陰君火六寂之重主吉凶之事本脈洪大自旺之時貴乎應心不宜沉靜散大輕清秀麗分明為妙肝脈厥陰風木十二菽之重主功名本脈弦細而長自旺之時貴乎應時不宜浮散取其輕清長弦分明為上膽脈忌前大後小前小後大急躁洪盛與少陽同肺脈陽明燥金三寂之重主刑剋蓋肺在膈上下宜洪大本脈浮澀而短取其輕清如毛輕清最忌奔湧大小洪大貴乎略無混雜脾脈太陰濕土九菽之重主才祿其脈緩大而弱四季若春陽阿阿之緩為脾土之正不宜奔湧前大後小皆非所宜明靜得體方為住才腎脈少陰寒水主壽數男左女右兼中指大總脈黍之十六菽之重按之至骨為本脈冬月尤宜鎮靜不宜急躁老人之脈宜靜之中至數和勻男子宜陽盛陰衰女人宜陰盛陽衰三焦命門少陽相位與老人同膀胱小腸太陽胃大腸陽明初中末三主肝上沉取初主肝上中初中主脾部沉取末主初主二十五歲以前中主二十六歲後末主五十歲後以卦斷榮枯女人肺上沉取初主肺中主脾沉取末主皆以卦斷榮枯更以部決出身心性福德以心部決刑剋遊年化氣七表八里甲己土運脾乙庚金運肺丙辛水運腎丁壬木運肝戊癸火運心假如丙辛之年腎脈主事且如腎脈宜沉滑春月肝木旺正二月間當弦細而長腎亦滑而弦若至三月是土旺之月土脈緩大而弱腎脈亦帶緩滑為正若反此即是受病之年余仿此古人取浮脈決奴僕頭正且如丙辛之年左尺有受克右尺脈浮見奔湧洪大則奴僕頭匹有死七表屬陽洪大熱火浮風虛金芤失血火滑嘔逆水實壅塞火弦拘急木腎病寒水浮如指下捻蔥葉芤則中空有兩頭滑如珠動未流利實則有力按中求弦若弦兮時帶數緊旺琴絃促未休洪舉有餘來極大此名七表屬陽流八里屬陰微微弱主水沉水濕虛弱緩風痿痹不仁澀精虛血少氣多遲主寒為弱伏與沉同濡男子失精女子經脈不調弱虛應濡弱爛綿沉至骨微來指下細如絲遲澀輕刀刮竹皮緩小於遲來往慢伏潛骨里似來時沉虛指間來又退弱按輕綿重不知此為八里不須疑太素五運所屬甲乙土運脾部乙庚金運肺部丙辛水運腎部丁壬木運肝部戊癸火運心部六氣所屬主初氣立春至春分二氣清明至小滿三氣芒種至大暑四氣立秋至秋分五氣寒露至小雪六氣大雪至大寒三陰三陽易曰天地媾精萬物化醇又曰乾道成男坤道成女又曰有夫婦然後有父母又曰乾再孛得中女坤再索得中男王冰曰男女有陰陽之資精血之異陰靜溢滿而去血陽動應合而泄精二者通和故能有女精澄曰陽精先至陰血後參精開裹血陽外陰內陽合陰胎而女成形矣陰血先至陽精後沖陰血裹精陰外陽內陰合陽胎而男成形矣曰圖不盡言言不盡意非不盡也不敢受其言之盡而人之愚也豫令盡廉溪之所未盡寧不及所以遇今人耶太素明文説太素脈者始於黃帝岐伯傳於扁鵲倉公伊尹黃石公皆能之魏華陀漢仲景晉褚澄唐思邈皆祕而不傳遂至中絶至宋希夷陳先生出始於太素脈訣授青城山王朴先生先生受斂人張子克承務其是具載於醫説希椎言云逢人莫浪説遇友不須訣時便有陰功拆又曰不相面不相掌不是看星並揣骨有人悟此妙玄機無上神仙由此得凡我同志之士切宜珍之太素捷輕心命宮小腸遷移肝官祿膽福德腎壽元膀胱疾厄肺父母大腸妻子脾田宅胃才帛命兄弟三焦奴僕右配十定宮無刑者屬陽故居左有刑者屬陰故居右天有五行見於五星地有五行見於五嶽人有五行見於五性日用飲食見於五味身有五行見於六脈何也蓋人造化得之父母交感之初一時厚薄清濁之氣是以智愚貴賤禍福由是而出自非脈不足以明之師曰諸術之中惟周易課子平三命太素脈此三者為真術余者皆風斯下矣有抽不抽之結有隱不隱之形至於易課太素皆然微乎深乎又豈見淺薄識之所能及哉學者當以心悟斯為得之矣張子克承務先生記克金乘木位木乘金位生火乘土位土乘火位克土乘水位水乘土位克金乘火位火乘金位克水乘火位火乘水位生水乘木位木乘水位生金乘土位土乘金位生木乘火位火乘木位心脈沉滑者有口舌是非狂禍一向滑者其人賤相沉者主痰飲一向沉者其人作事有頭無尾惟洪大者為妙矣小腸脈浮如粥之沸主路死道亡肝脈沉三至四至五至八至浮取而得之者晚年好一至二至六至七至浮取得之主初年不好中取得之者主中年不好沉取得之者主晚年不好膽脈浮如粥之沸者主官事若弦者是祖宗蔭德也主有功名做官也腎脈沉口傳且如十九歲動則止肺脈沉洪大而浮如滾粥主父母不得力刑剋過房微澀而緩主父母得力膀胱脈浮初下指無力者初主小年多病而已大腸脈浮洪大而浮又如滾粥主妻子刑剋無成微澀而短主妻子賢能脾脈浮弦者主人無才不聚如滾粥者賣宗祖田宅緩大者有業田宅甚好胃脈浮與脾脈同命門脈沉如滾粥者主兄弟不得力沉者兄弟好三焦脈浮如滾粥者主奴僕盜才物洪緩者主有文書至添人口之喜七表之圖浮者如水之漚出乎水而雜乎水浮舉有力按之如無芤者氣盛則衰氣虛則散兩頭則有中間全無滑者如盤中之珠流利三關如珠往來亦利滑如珠圓實者如風中有物按之不動而放下來一息四至不遲不疾弦者如箏弦之秀麗其長過指而有力如按琴絃直無曲繞緊者如琴絃之促軫旋轉戚戚然數如紐歸轉動谷手動洪者如江河之浪濤之湧來之至大去之至長八里之圖微者如按緩動搖縮縮無力輕虛細軟指按如綿沉者如石之投水尋之至底方見其有如舉之即無按之有力緩者如無力人行一步不止一息四至出如帶軟澀者如避事之人欲出復往三五不調如刀刮竹如病蠶吃葉應指遲者遲遲然動如避事之人欲出復往一息四至應指似緩伏者如深藏骨縫輕重俱無至乃則有舉之全無至骨乃有濡者如輕綿之水按之溫溫然而至重輕軟沉細按之即絶弱者如葉浮水上初按則著隨按如無微軟無力來往如絲七表八里論籲大概言心脈洪弦謂之君臣得位慶會之脈有官遷官進職無官者當有奇遇若心脈洪滑三焦洪滑為君臣失位所主異是矣六脈俱浮母氣者主得父母之憂異於他子六脈子脈歸母腹主得子之力如曾閔幹蠱興家六脈之中胃脈平和者兄友弟恭長幼有序反此亦不同矣仿此推之何有隱哉仍且六脈之中最怕代脈一脈受代一經之絶如脾部全無本脈而全得弦長洪大以日時加之受克可卜其死之日矣若四季流年各本推斷得母氣者斯為上脈無所不可矣太素總論心脈屬火性貴而促至不滿於九而用心於八卦相生若至於九尚何言至數之多哉蓋九者亢陽之數人遇之孤貧無此敢得純乾之脈哉心脈其體洪至十五歲以前乾卦而止者大人得之主性高明剛健純一不已小人遇之主為性輕燥常有盲聾之疾然亦不失為耿直之士兌卦數而止主為性和悅心事平坦敬人人常敬之達則伊尹傳説窮則曾子顏回純乎君子之心毫無小人之私者也離卦數而止主為性聰明機敏爽利光霽待人接物各曲盡其性端為文章之士忠孝之人震卦而止主為性躁暴不能容物治家嚴肅與人識俗心事激立無私己害人之心亦主聰明文章終未免喜怒不常耳巽卦數而止主為聰明機變多學多能於説辨論擺合縱橫但處性不定介乎君子小人之間長於奔競易於動搖非九流之士則遊俠之輩坎卦數而止主為性險惡姦曲餡詐邪辟造惡興謗反道背德下賤之人則賊盜是為凶惡者也良卦數而止主為性愚頑無知不辨菽麥為耕田荷擔之夫或勇而無謀或狠而好鬥所謂愚夫愚婦者也坤卦數而止主為性迂緩溫和容物舍垢納汙惜孤念寡興財好設樂道安貧不與人競亦不欺人非君子長者之士則山林隱逸之人若更如珠之明靜則福德深厚逍遙八極之表而出塵俗者也若三部俱弦而急獨肝部尤甚為人性急不受激觸卻心事明白無藏怒宿怨之心為有決斷若心部浮大散而止主憂疑驚恐纏繞若蝴蝶舞三至一止者決有文書及進口添人子女之喜若一至及散風無頭緒者主有官事口舌之事短促而止者主破才失脫若春月之間心脈洪弦而止者初夏之時定見轉職及婚姻得才人口之喜若三部俱數而止主狂言虛驚破才之事若心部脈弦滑而長應指如珠決主大賢明敏文章之士與衆人不同若本部窒塞應指不明主心厲害常有損人利己之心矣窒塞者隔紙如模糊也其體法若尖而逆謂之不及主作事進退前大後小作事有始無終若見弦脈謂之得母氣主十五歲有功名如神童之類是也若見緩脈謂之脾脈見心部為子歸母腹主往才祿若見滑脈謂之水剋火主十五歲之內多病若見奔湧主為事不常主有訟事若見蝴蝶之鬥舞主終身才祿之喜若脈洪大主性強急迫若浮取見數脈謂之小腸脈動主遷移遠行若見脈分作兩路遷移腳離經次主當在途中如同使臣之類與肝脈相交謂之合脈主人和合若遷移脈浮而奔湧主路死亡或受官刑若帶澀謂之金乘火位主絶嗣此澀者言小腸脈澀者也膽脈二十一至主十五年三十五歲以前其體浮弦若下指時便如箏弦之秀麗大小停勻浮而應指分明不雜得十五以上者緑鬢三公承相父之遺澤四十至應指者位至郡守三十至者位至守令二十五至者位至參佐之職其至數不及者但得大體明淨亦然一職一任之微若混雜大小不勻則十年之中無功名之望其或奔湧不定有官者失職常人官司破才之失也肝脈此最為緊關之處沉取初主二十五歲以前氣數中取二十五歲後事仍以卦數行運斷其本沉弦四十至位列三公若見金脈雖為宰相亦必進退艱難三十至以上位至守令二十至以上雜職散官金脈亦如是若大小明淨往來如珠之利者主風憲之權兼以肺脈滑者主生殺之柄若三部俱弦至數及者力扛九鼎職振一方位至上將掌生死建節開閫割土封侯至數次者亦有千夫主長之應其或奔湧六部俱弦心應坎良則為軍職為刑剝配加以六脈俱克則生當斬首分尸若撒干沙應指不明則貧窮下賤之人貴乎輕清如珠略無阻礙吏朝寸口五十息以上無改即是大貴若脈又如珠肝脈又朝寸口通三關如珠為官可至風憲其體弦若逆尖主功名進退若見滑脈主功名若見洪脈主有才若見澀脈謂之鬼賊相剋至數一向如此主功名之脈若後見洪謂之子來救母主先難後易若膽脈一同屬行年上趕本人有無陰陽故主功名肺見澀脈而肺部洪大謂之心不能回歸肝部卻去肺中作鬧謂之撒元揭虛肺脈回救肝脈得解亦主功名令知軍官色目蒙古多有此脈如之心應坎卦或六部俱弦相生此為其人險中立身而起功名若見緩脈者死如肝脈五至是一至管五年前兩至澀主十年之中無功名後三至洪主後十五年有功名若八至是三年管一至洪澀如之若十三至者兩年半管一至洪澀如之若見奔湧主名得失算其至數知在何年兼以腎參斷餘脈仿此若浮見為膽脈禍福與脈同若與肝脈共上朝寸口主風憲之人若浮見共朝寸口主二十五歲以上有此官沉見則在二十五歲後有此官浮沉俱見主終身風憲日月多也若行年湧而絶者此主為訟之年如以三焦洪弦心脈洪滑謂之君臣失位常人官訟遭刑有官者必失職若三焦洪緩心脈洪弦謂之君臣得位主常人食祿有官者加職若得失謂脈者卻肝脈不奔湧又不中節又輸寸口腎脈無虧此主大事虛驚卻無損敗之理脾胃之脈沉取五十之後晚年氣數其微緩五十至以上者歲為上富三十至以上為中富二十至以上為下富其至數不及但應指分明亦主康裕若浮而應者有才無田沉而應者田才優裕若見洪緩主受祖業緩而澀者主得妻才或主子才得力成家但為人鄙吝權自內出若見微滑則有不肖敗家之子淫欲之妻自身狼僻好叨不能自振者也若應指不明乍弦乍數乍大乍小者終身貧困若見奔湧則破蕩祖業潦倒無成奔波乞丐不恥於人者也若前大後小忽然災起無頭緒今日雖富他日貧薄須看中末行何卦行運以及大綱成敗前大後小前小後大卦數行運一向相背亦不可斷其後來發達大概貴乎合格為上若本部澀滯則主慳吝若輕清緩遲上朝寸口主為能食若應指虛澀主腥物所傷若滑弦而遲主冷細而虛主冷漿之物所傷若前小後大應指今日雖貧他日卻富更看卦數行運定其何年發越其體緩五十五至七十五歲數若如春楊柳又洪大主受祖業若見洪脈主有功名若見澀脈者主有得才祿亦主得妻才主妻子得力成家但不死鄙吝若見弦脈謂之鬼賊相形終身才祿無成若見奔湧破蕩祖業前小後大先富後貧胃脈與禍福相同浮見田宅浮沉一般田才俱好若作分兩路加以緩洪者主有外庫之才出外經商得利其利又分為兩路又奔湧主外出喪才之由也大腸脈其體微而緩緩而短若應指明淨則主妻子賢明終身無克離巽而上者男多女少兌震而上者男少女多若見奔洪主刑剋加以六脈俱克則身無子孤寡之命或僧道師尼之輩若見滑脈是養子成家館甥待老之兆肺脈其體短而澀若應指分明主數長遠又帶微緩指非四親俱應則父母雙全盡菽水之養終綵衣之娛人生所最難造化所甚穻三五數而止者先克父二四數而止者先克母奔湧無定少年失怙恃之親緩滑相乃終身為異姓之託其體澀而短如毛輕若見緩主父母言好若見滑脈妻子宮好亦有才祿若奔湧主父母有災若至數中止腎脈見又主大孝浮見主妻子無成亦主災洪為金居火部主多刑剋左尺脈其體洪而硬一初得天地父母者也所得天地父母得厚者昌而壽得薄者促而夭此一定不易之數知者詳察此左尺定其壽夭之體以右尺定其歲數之多寡萬無一失也若兩尺但無外腎不足左尺奔湧乍疏乍數乍急淫欲輕狂右尺奔湧主奴僕馬有災主竊盜才物其體浮滑者沉者為壽元初下指時茫然無力主一生多病若勻主終身無病然後沉著之至骨若三四至之久徐徐然輕起指然後數之以俟其止則知其得幾歲之申有促軫元轉旋此即是禍患之年看其幾至則知其福何年若起指後第三至忽浮而起此定是妻宮有生男之兆若右尺脈亦三至而浮起決生女其或左尺奔湧主一生奔波疾病乍疏乍數謂之脈帶咸池亦主淫欲為人輕狂女人得此尤甚右尺浮為僕馬沉為兄弟若浮而洪緩主僕馬得力湧主僕馬有災或竊盜才沉而洪緩則兄弟得力若見奔湧兄弟無情其刑剋之脈亦然此乃刑剋兄言弟兄弟刑剋也女子以右尺脈定壽夭禍福歲數萬無一失也又心脈一至者主人雖然聰明或有心風疾二至者主人心性溫和平坦極直最為君子三至者其人心事極直無損人利己之心只是喜怒不常不受人觸五至者其人心能言會語長於奔兢易於動搖可以為善可以為惡介乎君子小人之間六至者其人反復面是背非心術不正最凶惡之人七至者其人凶恨蠢之人也八至者其人好道平坦無私寬大容易妙人也九至乞丐之人也肺脈一至三至五至先克父二至四至先克母若至數純全父母雙全也太陽脈三至浮起者主男子生之喜二至四至五至不克妻有賢妻三至又三至克妻之兆肝脈三十至上下六品二十五至二十六至一十七至七品二十至八品十五至九品十二至十三至省院判十至九至路司吏七至八至州司吏五至六至縣司吏三至四至秀才二至六七庶人膽脈弦者木星行龍滑者水星行龍洪者火星行龍澀者金星行龍緩者土星行龍小腸脈滑如粥滾者主牛馬墜落之厄四部心斷吉凶平善惡肝推貴賤細推詳刑剋但於肺部斷財福壽元脾土鄉看天頭宜仔細診性氣紛紛不可為若還左尺無分曉卻取大總必大知四季論五藏常將四季椎縱行微細不須醫若還外脈來相見卻藉時人用意思賤論下指紛紛似撒沙胸中不定動肝家勻和不見無情狀下賤之人定不差貧論下指紛紛似水洪為人才利一生空更加大小如洪水早晨得財晚又窮富論財祿還須向土宮若還不克産財豐更加急數無虧欠富貴千箱人敬崇貴論肝脈紛紛似隱珠才關連尺與珠常脈朝寸口能藏隱息數純全名播揚性格三部按時俱是弦須知憂怒叫連天若還又得震離卦喜怒不常心自賢三部俱弦是急獨肝部尤甚其人不受觸卻心事明白無宿怒怨幸之心為性疏快處事斷決若心部洪大而散主憂疑驚恐之事纏續求財春木火來時歡欣事可宜居宣加祿位求財萬倍歸火中如見土喜慎是資才洪緩時時見求財必主來秋金脈浮滑必是喜相隨忽然弦洪應求財必定歸冬月得弦長榮身壽更長忽然見洪緩澀可作經商六親肺為月孛母中堂妻子計都屬大腸忽然肺家來三至定是父先母后亡四數都緣刑剋母奔波空九有刑傷若還應指無分曉骨肉重重見不祥男女陽多應是有兒郎無陽定是賊人當淫欲若更陽多陰會少獨狂何處逐花香男子盛主人富貴寸口沉弱主人貧賤女子宜尺盛寸弱反此則主淫欲男子反此亦然決孕左寸浮即上馬郎右尺沉弱是小娘左即為男右即女兩邊兩應一雙雙女人左寸浮疾乃心部亦然則是孕男右尺沉弱則是孕女右尺俱疾定是雙女決祟浮大天神虛空鬼沉弱何泊及水官細長壇社樹木類遲緩土公欠些香短硬僧道曾有願芤散必定廟中王弱虛皂君來作禍有頭無尾客神亡大小參差為細鬼並將此脈決如祥僧道脈息紛紛入水珠自然清淨氣神符更看六脈無刑狀福德清間與衆殊脈息紛紛明似珠主為僧道有希奇播外自有功名顯六脈無刑衆上虧有福德也貴賤有滑如無骨纖纖手指長脈有三部秀必定是侯王骨軟皮膚滑洪溫滋潤光脈來當緩細榮貴顯衣郎兩手無庇黑皮膚洪滑光土宮無滯礙富貴積倉箱面細身手粗脈來無定居此人還是賤至老是貧夫骨粗皮肉澀指下冷如冰氣息俱洪大終為貧賤人皮膚洪更硬三部脈紛紛至老須貧賤應為有力人脈賦欲測疾兮生死須詳脈兮有靈左辨心肝之理右辨脾肺之情此為寸關所主腎即兩尺分並三部五藏易識七診九候難明晝夜循環榮衛須有定數男女長幼大小各有殊形復有節氣不同須知春夏秋冬建寅卯月兮木旺肝脈弦長而命隆當其己午心火而洪脾屬四季遲緩為宗申酉是金為肺微浮短宜逢亥子乃腎家之旺得其沉細各為平脈之容既平脈之不衰反見鬼兮命危兒扶母兮瘥速母抑子兮退遲得妻不同一治生死仍須各推假令春得肺脈為鬼得心脈乃是肝兒暇為其母脾則為妻春得脾而莫療冬見心而不治夏得肺而難療秋得肺亦何疑此乃論四時休旺之理明五行相剋之儀舉一隅而為例則三隅而可知按平弦而若緊欲識澀而似微浮芤其狀相反沉伏殊途同歸洪與實而形同倣佛濡與弱而性帶依稀先辨此情後論其理更復通於藥性然後可以為醫既已明其三部須知疾之所有寸脈急而頭痛弦為心下之咎緊是肚痛之癥緩即脾頑之候微微冷入胸中數數熱居胃口滑主壅多澀而氣少胸連脅滿只為洪而莫非膹引背疼緣是沉而謬更過關中浮緩不飧緊牢氣滿喘息難痊弱以數兮胃熱弦以滑兮胃寒微即心下脹滿沉兮膈上吞酸澀即宜為虛視沉乃須作實看下重緣濡女萎散療之在急水攻因伏牽牛湯瀉則令安爾乃尺中脈滑定知女經不調男子遇此之候必主小腹難消為伏谷兮不化微即肚痛無憀弱緣胃熱上壅遲是寒於下焦胃冷嘔逆澀候腹脹陰疝弦牢緊則痛居其腹沉乃疾在其腰濡數浮芤皆主小便赤澀細詳如此之候何處能逃若問女子何因尺中不絶胎脈方真太陰洪而女孕太陽大而男娠或遇俱洪而當雙産此法推之若神月數斷之各依其部假令中衝若動此乃將及九旬患者要知欲死須詳脈之動止彈石劈劈而又急解索散散而無聚雀啄頓木而又住屋漏將絶而復起蝦遊苒苒而進退難尋魚躍澄澄而遲疑掉尾嗟乎遇此之候定不能起縱有丸丹天命而已復有困重沉沉聲音劣劣寸關雖無尺猶不絶往來息均踝中不歇如此之流何憂殞滅經文具載樹無枝葉而有根人困如斯垂死乃當更治四時脈證脾脈浮緊是傷食肺脈浮緊是傷風右三部浮緊是傷食左三部浮緊是傷風肺脈浮緊與脾脈緊者是夾食傷寒六脈浮緊有毒脈過關者是斑症死心脈浮散是中暑脾脈弦緊是瘧疾腎脈浮緊是中濕汗吐下三脈六脈浮緊當汗心脈浮緊當吐脾脈浮緊當下論壽脈凡脈動五十一代者為高壽四十五動為中壽不足者夭也脈定生死止應九十日脈如火焰炎炎不定是己精已奪草枯時死脈如風飄亂葉肝氣虛木葉落時死脈至長堅如橫木之狀膽氣不足禾熟時死脈至如弦縷是胞精不足病多言霜落時死不言可活脈如湧浮鼓指下出而不入太陽氣不足少氣韭花開時死脈如懸珠浮揣蓋夭十二愈不足冰時死脈如小刀浮小魚沉堅大五藏鬱結寒熱獨並於腎令人不得坐臥立春時死脈如泛泥按之動不可得大腸不足棗葉生時死脈如循毛輕虛難可狀令人善恐不欲坐臥行立常聽是小腸不足季秋時死脈如頽上按之無肌氣不足五色先見黑白纍發死脈藹藹如車蓋名曰腸結脈纍纍如循長竿名曰陰結脈瞥瞥如羹上肥者陽氣微也脈縈縈如蛛絲細者陰氣衰也脈綿綿如瀉潦之絶者亡其血也十怪脈論傷寒之證雀啄連三五至而歇再至者如雀啄之狀屋漏忽然不時一至若屋漏雨點是也彈石若擊石子而跳起者是也解索如繩索之狀魚翔如魚水中遊蕩之狀蝦遊若蝦之一躍是也偃刀如循刃之嘖嘖也麻促促如麻散亂之狀轉豆若展轉周旋之狀釜沸若沸湯之滾出之狀凡有此者不治女脈大略女子尺脈常盛不宜太弱若尺脈滑按之不絶孕也為之喜脈若尺脈沉細者無孕也欲産之脈沉細而滑夜半覺應來日午日生若身體寒熱舌下青黑反舌上冷子死腹中也若面赤青母活子死也若面青舌青沫出於口母死子活也若唇口俱青沫出於口者子母俱死也新産之脈緩滑吉沉重者吉沉細跗骨者吉實大弦緊死堅牢者死寸口澀緊者死餘症之脈與男脈同見前脈訣
